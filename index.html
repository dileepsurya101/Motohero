<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOTOHERO - Pro Street Racing</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',sans-serif;overflow:hidden}
#wrap{position:relative}
canvas{display:block;border:2px solid #ff4500;box-shadow:0 0 40px #ff4500,0 0 80px rgba(255,69,0,0.3);border-radius:4px}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);z-index:10}
#overlay h1{font-size:52px;font-weight:900;text-transform:uppercase;letter-spacing:8px;color:#ff4500;text-shadow:0 0 20px #ff4500,0 0 60px rgba(255,69,0,0.5);margin-bottom:6px}
#overlay p{color:#aaa;font-size:16px;letter-spacing:2px;margin-bottom:30px}
.btn{background:linear-gradient(135deg,#ff4500,#ff8c00);color:#fff;border:none;padding:14px 50px;border-radius:50px;font-size:22px;font-weight:700;cursor:pointer;letter-spacing:2px;text-transform:uppercase;box-shadow:0 0 20px rgba(255,69,0,0.6);transition:all .2s}
.btn:hover{transform:scale(1.08);box-shadow:0 0 35px rgba(255,69,0,0.9)}
#hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:12px 16px;pointer-events:none;background:linear-gradient(to bottom,rgba(0,0,0,0.7),transparent)}
.hud-item{color:#fff;font-size:13px;font-weight:600;letter-spacing:1px;text-shadow:0 0 8px #ff4500}
.hud-val{font-size:22px;color:#ff4500;font-weight:900;display:block;text-shadow:0 0 12px #ff4500}
#lives{display:flex;gap:4px;align-items:center}
.heart{width:18px;height:18px;background:#ff4500;clip-path:polygon(50% 0%,61% 11%,98% 11%,100% 30%,50% 100%,0 30%,2% 11%,39% 11%);box-shadow:0 0 6px #ff4500}
</style>
</head>
<body>
<div id="wrap">
<canvas id="c"></canvas>
<div id="hud" style="display:none">
  <div class="hud-item">SCORE<span class="hud-val" id="sc">0</span></div>
  <div class="hud-item">SPEED<span class="hud-val" id="sp">0</span> <small>km/h</small></div>
  <div class="hud-item">LEVEL<span class="hud-val" id="lv">1</span></div>
  <div class="hud-item">LIVES<div id="lives"></div></div>
</div>
<div id="overlay">
  <h1>MOTOHERO</h1>
  <p>ARROW KEYS &nbsp;|&nbsp; WASD &nbsp;|&nbsp; AVOID TRAFFIC</p>
  <button class="btn" onclick="startGame()">START RACE</button>
</div>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const overlay=document.getElementById('overlay'),hud=document.getElementById('hud');
const scEl=document.getElementById('sc'),spEl=document.getElementById('sp'),lvEl=document.getElementById('lv'),livesEl=document.getElementById('lives');
canvas.width=440;canvas.height=700;
let W=canvas.width,H=canvas.height;
let active=false,score=0,speed=4,level=1,lives=3,invincible=0;
let player={x:W/2-25,y:H-120,w:44,h:76,lane:1};
let enemies=[],particles=[],stars=[],coins=[],roadLines=[];
let keys={};let raf;
const LANES=[80,170,260,350];
const CAR_COLORS=['#e74c3c','#3498db','#2ecc71','#9b59b6','#1abc9c','#f39c12','#e91e63'];
window.addEventListener('keydown',e=>{keys[e.code]=true;e.preventDefault()});
window.addEventListener('keyup',e=>keys[e.code]=false);
function initStars(){for(let i=0;i<80;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+0.5,s:Math.random()*0.5+0.5});}
function drawRoad(){ctx.fillStyle='#0d0d0d';ctx.fillRect(0,0,W,H);
ctx.fillStyle='#1a1a1a';ctx.fillRect(60,0,W-120,H);
ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=2;
[60,W-60].forEach(x=>{ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();});
ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.setLineDash([30,20]);ctx.lineDashOffset=-score*0.3;
ctx.lineWidth=1.5;
[130,220,310].forEach(x=>{ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();});
ctx.setLineDash([]);}
function drawStars(){stars.forEach(s=>{s.y+=s.s*0.3;if(s.y>H)s.y=0;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fill();});}
function drawPlayerCar(x,y,w,h){ctx.save();
if(invincible>0&&Math.floor(invincible/5)%2===0){ctx.restore();return;}
let g=ctx.createLinearGradient(x,y,x+w,y+h);
g.addColorStop(0,'#ff6600');g.addColorStop(0.5,'#ff4500');g.addColorStop(1,'#cc2200');
ctx.shadowColor='#ff4500';ctx.shadowBlur=15;
ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(x,y,w,h,6);ctx.fill();
ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(x+6,y+12,w-12,20);ctx.fillRect(x+6,y+h-30,w-12,16);
ctx.fillStyle='rgba(255,220,50,0.9)';ctx.fillRect(x+4,y+h-24,8,8);ctx.fillRect(x+w-12,y+h-24,8,8);
ctx.fillStyle='rgba(255,100,0,0.8)';ctx.beginPath();ctx.arc(x+w/2,y+h+8,6,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#333';ctx.fillRect(x-5,y+15,5,20);ctx.fillRect(x+w,y+15,5,20);ctx.fillRect(x-5,y+h-35,5,20);ctx.fillRect(x+w,y+h-35,5,20);
ctx.restore();}
function drawEnemy(e){ctx.save();
let g=ctx.createLinearGradient(e.x,e.y,e.x+e.w,e.y+e.h);
g.addColorStop(0,e.color);g.addColorStop(1,shadeColor(e.color,-40));
ctx.shadowColor=e.color;ctx.shadowBlur=8;
ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(e.x,e.y,e.w,e.h,5);ctx.fill();
ctx.fillStyle='rgba(0,200,255,0.7)';ctx.fillRect(e.x+6,e.y+10,e.w-12,18);
ctx.fillStyle='rgba(255,240,80,0.9)';ctx.fillRect(e.x+4,e.y+e.h-20,8,8);ctx.fillRect(e.x+e.w-12,e.y+e.h-20,8,8);
ctx.fillStyle='#333';ctx.fillRect(e.x-5,e.y+15,5,18);ctx.fillRect(e.x+e.w,e.y+15,5,18);ctx.fillRect(e.x-5,e.y+e.h-33,5,18);ctx.fillRect(e.x+e.w,e.y+e.h-33,5,18);
ctx.restore();}
function shadeColor(c,p){let r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);return'#'+[r,g,b].map(v=>Math.max(0,Math.min(255,v+p)).toString(16).padStart(2,'0')).join('');}
function spawnEnemy(){const lane=LANES[Math.floor(Math.random()*LANES.length)];enemies.push({x:lane,y:-80,w:44,h:76,color:CAR_COLORS[Math.floor(Math.random()*CAR_COLORS.length)],speed:speed*0.7+Math.random()*2});}
function spawnParticle(x,y,color){for(let i=0;i<12;i++)particles.push({x,y,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8,alpha:1,color,r:Math.random()*4+2});}
function drawParticles(){particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.alpha-=0.04;p.vx*=0.95;p.vy*=0.95;ctx.save();ctx.globalAlpha=p.alpha;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();ctx.restore();return p.alpha>0;});}
function drawHUD(){scEl.textContent=score;spEl.textContent=Math.floor(speed*20);lvEl.textContent=level;
livesEl.innerHTML='';for(let i=0;i<lives;i++){const h=document.createElement('div');h.className='heart';livesEl.appendChild(h);}}
function handleInput(){const spd=6;if((keys['ArrowLeft']||keys['KeyA'])&&player.x>65)player.x-=spd;if((keys['ArrowRight']||keys['KeyD'])&&player.x<W-65-player.w)player.x+=spd;if((keys['ArrowUp']||keys['KeyW'])&&player.y>10)player.y-=spd*0.6;if((keys['ArrowDown']||keys['KeyS'])&&player.y<H-player.h-10)player.y+=spd*0.6;}
function checkCollisions(){enemies.forEach(e=>{if(invincible>0)return;if(player.x<e.x+e.w-6&&player.x+player.w>e.x+6&&player.y<e.y+e.h-6&&player.y+player.h>e.y+6){spawnParticle(player.x+player.w/2,player.y+player.h/2,'#ff4500');lives--;invincible=120;if(lives<=0)gameOver();}});}
function update(){if(!active)return;ctx.clearRect(0,0,W,H);
drawStars();drawRoad();
handleInput();
if(invincible>0)invincible--;
enemies.forEach((e,i)=>{e.y+=e.speed;if(e.y>H+100){enemies.splice(i,1);score+=10*(level);}});
if(Math.random()<0.015+level*0.003)spawnEnemy();
drawParticles();
enemies.forEach(e=>drawEnemy(e));
drawPlayerCar(player.x,player.y,player.w,player.h);
checkCollisions();
score+=1;speed=4+Math.floor(score/500)*0.5;level=1+Math.floor(score/1000);
drawHUD();
raf=requestAnimationFrame(update);}
function startGame(){active=true;score=0;speed=4;level=1;lives=3;invincible=0;enemies=[];particles=[];player.x=W/2-22;player.y=H-120;overlay.style.display='none';hud.style.display='flex';cancelAnimationFrame(raf);update();}
function gameOver(){active=false;cancelAnimationFrame(raf);overlay.style.display='flex';overlay.innerHTML='<h1>WIPEOUT</h1><p>Score: '+score+' &nbsp;|&nbsp; Level: '+level+'</p><button class="btn" onclick="startGame()">RACE AGAIN</button>';}
initStars();
</script>
</body>
</html>
